apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1-hello
  labels:
    app: app1-hello
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app1-hello
  template:
    metadata:
      labels:
        app: app1-hello
    spec:
      containers:
      - name: app1-hello
        image: nginx:latest
        ports:
        - containerPort: 80
        env:
           - name: ENV_VALUE
             value: "hello from app.yaml"
           - name: DB_PASSWORD
             value: "c3VwZXItc2VjcmV0LXBhc3N3b3JkLTEyMw=="

        # env:
        # - name: APP_NAME
        #   valueFrom:
        #     configMapKeyRef:
        #       name: app-config
        #       key: APP_NAME
        # - name: DB_PASSWORD 
        #   valueFrom:
        #     secretKeyRef:
        #       name: app-secret
        #       key: DB_PASSWORD


---

apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  type: NodePort
  selector:
    app: app1-hello
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30002
